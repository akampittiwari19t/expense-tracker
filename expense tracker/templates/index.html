<!DOCTYPE html>
<html>

<head>

    <title>Expense Tracker</title>

    <style>

        body{
            font-family: Arial;
            background-color: lightblue;
            text-align: center;
        }

        h1{
            color: darkblue;
        }

        form{
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            background: blue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
        }

        table{
            margin: auto;
            margin-top: 20px;
            background: white;
            border-collapse: collapse;
            width: 80%;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

        a{
            color: red;
            text-decoration: none;
        }

    </style>

</head>

<body>

    <h1>Expense Tracker</h1>

    <form method="POST">

        <input type="date"
        name="date"
        required>

        <input type="text"
        name="category"
        placeholder="Category"
        required>

        <input type="text"
        name="description"
        placeholder="Description"
        required>

        <input type="number"
        step="0.01"
        name="amount"
        placeholder="Amount"
        required>

        <button type="submit">
            Add Expense
        </button>

    </form>

    <table>

        <tr>
            <th>No.</th>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Delete</th>
        </tr>

        {% for expense in expenses %}

        <tr>

            <td>{{ loop.index }}</td>
            <td>{{ expense[1] }}</td>
            <td>{{ expense[2] }}</td>
            <td>{{ expense[3] }}</td>
            <td>₹ {{ expense[4] }}</td>

            <td>
                <a href="/delete/{{ expense[0] }}">
                    Delete
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
